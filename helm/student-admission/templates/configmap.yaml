apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ .Release.Name }}-app-config
  labels:
    {{- include "student-admission.labels" . | nindent 4 }}
data:
  DB_URL: "jdbc:postgresql://{{ include "student-admission.postgresServiceName" . }}:{{ .Values.postgres.port }}/{{ .Values.postgres.database }}"
  DB_USERNAME: {{ .Values.postgres.username | quote }}
