# ── Application ──────────────────────────────────────────────
app:
  name: student-admission
  image:
    repository: catninjauser/helloapps-java
    tag: "2.0.0"
    pullPolicy: Always
  replicas: 1
  port: 8080

  resources:
    requests:
      memory: "256Mi"
      cpu: "250m"
    limits:
      memory: "512Mi"
      cpu: "500m"

# ── Service ───────────────────────────────────────────────────
service:
  type: NodePort
  port: 80
  targetPort: 8080
  nodePort: 32000

# ── Probes ───────────────────────────────────────────────────
probes:
  startup:
    path: /actuator/health/liveness
    initialDelaySeconds: 30
    periodSeconds: 10
    timeoutSeconds: 5
    failureThreshold: 30

  liveness:
    path: /actuator/health/liveness
    initialDelaySeconds: 0
    periodSeconds: 10
    timeoutSeconds: 5
    failureThreshold: 3

  readiness:
    path: /actuator/health/readiness
    initialDelaySeconds: 0
    periodSeconds: 5
    timeoutSeconds: 3
    failureThreshold: 3

# ── PostgreSQL ────────────────────────────────────────────────
postgres:
  image:
    repository: postgres
    tag: "17-alpine"
  database: hellodb
  username: postgres
  password: postgres123
  port: 5432
  storage: 1Gi

  resources:
    requests:
      memory: "256Mi"
      cpu: "250m"
    limits:
      memory: "512Mi"
      cpu: "500m"
